<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Разделить PDF</title>
</head>
<body>
    <h2>Разделить PDF</h2>

    <form action="/split" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required><br><br>
        <input type="text" name="pages" placeholder="Например: 1-3" required><br><br>
        <button type="submit">Разделить</button>
    </form>
</body>
</html>
