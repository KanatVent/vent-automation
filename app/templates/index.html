<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Проверка</title>
</head>
<body>
  <h2>Экран проверки</h2>
  <p>Найдено строк: {{ items|length }}</p>

  <table border="1" cellpadding="6">
    <tr>
      <th>Система</th><th>Наименование</th><th>Размер</th><th>Толщина</th><th>Кол-во</th>
    </tr>
    {% for i in items %}
      <tr>
        <td>{{ i.system }}</td>
        <td>{{ i.raw }}</td>
        <td>
          {% if i.shape == "round" %} Ø{{ i.d_mm }}
          {% else %} {{ i.w_mm }}x{{ i.h_mm }}
          {% endif %}
        </td>
        <td>{{ i.thickness }}</td>
        <td>{{ i.qty }}</td>
      </tr>
    {% endfor %}
  </table>

  <p><a href="/">← назад</a></p>
</body>
</html>
